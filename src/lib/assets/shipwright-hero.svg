<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Brain left hemisphere (organic curves) -->
  <path d="M100 40 C88 30, 65 32, 56 45 C47 58, 48 72, 55 82 C46 88, 40 100, 45 112 C50 124, 62 130, 74 128 C76 138, 84 150, 98 155"
    stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- Brain inner folds (left) -->
  <path d="M98 50 Q82 62, 70 58" stroke="#60a5fa" stroke-width="1.2" opacity="0.5" stroke-linecap="round" />
  <path d="M98 70 Q78 78, 62 75" stroke="#60a5fa" stroke-width="1.2" opacity="0.4" stroke-linecap="round" />
  <path d="M98 90 Q80 96, 55 92" stroke="#60a5fa" stroke-width="1.2" opacity="0.35" stroke-linecap="round" />
  <path d="M98 110 Q82 115, 68 112" stroke="#60a5fa" stroke-width="1.2" opacity="0.3" stroke-linecap="round" />
  <path d="M98 130 Q86 135, 78 130" stroke="#60a5fa" stroke-width="1.2" opacity="0.25" stroke-linecap="round" />

  <!-- Center divider (brain to chip transition) -->
  <line x1="100" y1="38" x2="100" y2="157" stroke="#60a5fa" stroke-width="0.8" opacity="0.15" />

  <!-- Chip right side (geometric) -->
  <!-- Chip body outline -->
  <rect x="102" y="52" width="52" height="90" rx="4" stroke="#60a5fa" stroke-width="2" opacity="0.7" fill="none" />

  <!-- Chip inner die -->
  <rect x="112" y="65" width="32" height="64" rx="2" stroke="#60a5fa" stroke-width="1" opacity="0.4" fill="none" />

  <!-- Die circuit pattern -->
  <line x1="118" y1="72" x2="138" y2="72" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="118" y1="82" x2="138" y2="82" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="118" y1="92" x2="138" y2="92" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="118" y1="102" x2="138" y2="102" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="118" y1="112" x2="138" y2="112" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="128" y1="65" x2="128" y2="129" stroke="#60a5fa" stroke-width="0.8" opacity="0.2" />

  <!-- Circuit nodes on die -->
  <circle cx="120" cy="77" r="2" fill="#60a5fa" opacity="0.8" />
  <circle cx="136" cy="87" r="2" fill="#60a5fa" opacity="0.7" />
  <circle cx="120" cy="97" r="2.5" fill="#60a5fa" opacity="0.9" />
  <circle cx="136" cy="107" r="2" fill="#60a5fa" opacity="0.7" />
  <circle cx="128" cy="120" r="2" fill="#60a5fa" opacity="0.6" />

  <!-- Signal wires going right (from chip pins) -->
  <!-- Top pins -->
  <line x1="154" y1="62" x2="172" y2="62" stroke="#60a5fa" stroke-width="1.5" opacity="0.5" stroke-linecap="round" />
  <line x1="154" y1="72" x2="180" y2="72" stroke="#60a5fa" stroke-width="1.5" opacity="0.45" stroke-linecap="round" />
  <line x1="154" y1="82" x2="175" y2="82" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />

  <!-- Middle pins -->
  <line x1="154" y1="92" x2="185" y2="92" stroke="#60a5fa" stroke-width="1.5" opacity="0.5" stroke-linecap="round" />
  <line x1="154" y1="102" x2="178" y2="102" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />

  <!-- Bottom pins -->
  <line x1="154" y1="112" x2="170" y2="112" stroke="#60a5fa" stroke-width="1.5" opacity="0.45" stroke-linecap="round" />
  <line x1="154" y1="122" x2="176" y2="122" stroke="#60a5fa" stroke-width="1.5" opacity="0.35" stroke-linecap="round" />
  <line x1="154" y1="132" x2="168" y2="132" stroke="#60a5fa" stroke-width="1.5" opacity="0.3" stroke-linecap="round" />

  <!-- Signal dots at wire ends -->
  <circle cx="172" cy="62" r="1.5" fill="#60a5fa" opacity="0.5" />
  <circle cx="180" cy="72" r="1.5" fill="#60a5fa" opacity="0.45" />
  <circle cx="175" cy="82" r="1.5" fill="#60a5fa" opacity="0.4" />
  <circle cx="185" cy="92" r="2" fill="#60a5fa" opacity="0.5" />
  <circle cx="178" cy="102" r="1.5" fill="#60a5fa" opacity="0.4" />
  <circle cx="170" cy="112" r="1.5" fill="#60a5fa" opacity="0.45" />
  <circle cx="176" cy="122" r="1.5" fill="#60a5fa" opacity="0.35" />
  <circle cx="168" cy="132" r="1.5" fill="#60a5fa" opacity="0.3" />

  <!-- Transition zone: brain-to-chip connections crossing the center -->
  <path d="M98 55 Q100 55, 102 55" stroke="#60a5fa" stroke-width="1" opacity="0.4" />
  <path d="M98 75 Q100 73, 112 72" stroke="#60a5fa" stroke-width="0.8" opacity="0.35" />
  <path d="M98 95 Q104 94, 112 92" stroke="#60a5fa" stroke-width="0.8" opacity="0.35" />
  <path d="M98 115 Q104 113, 112 112" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <path d="M98 135 Q102 137, 102 142" stroke="#60a5fa" stroke-width="0.8" opacity="0.25" />

  <!-- Subtle glow on center node -->
  <circle cx="100" cy="97" r="4" fill="#60a5fa" opacity="0.15" />
  <circle cx="100" cy="97" r="2" fill="#60a5fa" opacity="0.5" />
</svg>
