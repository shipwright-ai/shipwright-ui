<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Full brain outline (wraps around everything) -->
  <!-- Left hemisphere -->
  <path d="M95 38 C78 28, 52 32, 44 48 C36 64, 38 80, 48 90 C38 98, 32 112, 38 126 C44 140, 58 146, 72 142 C74 154, 84 164, 98 168"
    stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" />

  <!-- Right hemisphere (extends past chip) -->
  <path d="M105 38 C122 28, 148 32, 156 48 C164 64, 162 80, 152 90 C162 98, 168 112, 162 126 C156 140, 142 146, 128 142 C126 154, 116 164, 102 168"
    stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" />

  <!-- Brain folds that cross INTO the chip area -->
  <path d="M50 60 Q70 70, 95 62 Q110 58, 130 65" stroke="#60a5fa" stroke-width="1.2" opacity="0.35" stroke-linecap="round" />
  <path d="M48 80 Q68 88, 95 82 Q115 78, 140 85" stroke="#60a5fa" stroke-width="1.2" opacity="0.3" stroke-linecap="round" />
  <path d="M42 100 Q65 106, 95 98 Q118 94, 148 100" stroke="#60a5fa" stroke-width="1.2" opacity="0.25" stroke-linecap="round" />
  <path d="M48 118 Q70 124, 95 118 Q115 114, 138 120" stroke="#60a5fa" stroke-width="1.2" opacity="0.2" stroke-linecap="round" />
  <path d="M60 136 Q78 140, 95 136 Q108 133, 125 137" stroke="#60a5fa" stroke-width="1.2" opacity="0.18" stroke-linecap="round" />

  <!-- Chip body (overlapping center-right of brain) -->
  <rect x="88" y="55" width="56" height="88" rx="5" stroke="#60a5fa" stroke-width="1.8" opacity="0.6" fill="none" />

  <!-- Chip inner die -->
  <rect x="96" y="66" width="40" height="66" rx="3" stroke="#60a5fa" stroke-width="1" opacity="0.35" fill="none" />

  <!-- Circuit grid inside die -->
  <line x1="102" y1="76" x2="130" y2="76" stroke="#60a5fa" stroke-width="0.6" opacity="0.2" />
  <line x1="102" y1="88" x2="130" y2="88" stroke="#60a5fa" stroke-width="0.6" opacity="0.2" />
  <line x1="102" y1="100" x2="130" y2="100" stroke="#60a5fa" stroke-width="0.6" opacity="0.2" />
  <line x1="102" y1="112" x2="130" y2="112" stroke="#60a5fa" stroke-width="0.6" opacity="0.2" />
  <line x1="116" y1="66" x2="116" y2="132" stroke="#60a5fa" stroke-width="0.6" opacity="0.15" />

  <!-- Circuit nodes on die -->
  <circle cx="108" cy="76" r="2.5" fill="#60a5fa" opacity="0.8" />
  <circle cx="124" cy="76" r="2" fill="#60a5fa" opacity="0.6" />
  <circle cx="108" cy="88" r="2" fill="#60a5fa" opacity="0.7" />
  <circle cx="124" cy="88" r="2.5" fill="#60a5fa" opacity="0.8" />
  <circle cx="116" cy="100" r="3" fill="#60a5fa" opacity="0.9" />
  <circle cx="108" cy="112" r="2" fill="#60a5fa" opacity="0.6" />
  <circle cx="124" cy="112" r="2" fill="#60a5fa" opacity="0.7" />

  <!-- Signal wires extending right (from chip pins out through brain) -->
  <line x1="144" y1="65" x2="165" y2="58" stroke="#60a5fa" stroke-width="1.3" opacity="0.4" stroke-linecap="round" />
  <line x1="144" y1="76" x2="170" y2="74" stroke="#60a5fa" stroke-width="1.3" opacity="0.45" stroke-linecap="round" />
  <line x1="144" y1="88" x2="172" y2="88" stroke="#60a5fa" stroke-width="1.3" opacity="0.5" stroke-linecap="round" />
  <line x1="144" y1="100" x2="175" y2="100" stroke="#60a5fa" stroke-width="1.5" opacity="0.55" stroke-linecap="round" />
  <line x1="144" y1="112" x2="172" y2="112" stroke="#60a5fa" stroke-width="1.3" opacity="0.45" stroke-linecap="round" />
  <line x1="144" y1="124" x2="168" y2="126" stroke="#60a5fa" stroke-width="1.3" opacity="0.4" stroke-linecap="round" />
  <line x1="144" y1="134" x2="163" y2="140" stroke="#60a5fa" stroke-width="1.3" opacity="0.35" stroke-linecap="round" />

  <!-- Signal dots at wire ends -->
  <circle cx="165" cy="58" r="2" fill="#60a5fa" opacity="0.4" />
  <circle cx="170" cy="74" r="2" fill="#60a5fa" opacity="0.45" />
  <circle cx="172" cy="88" r="2" fill="#60a5fa" opacity="0.5" />
  <circle cx="175" cy="100" r="2.5" fill="#60a5fa" opacity="0.55" />
  <circle cx="172" cy="112" r="2" fill="#60a5fa" opacity="0.45" />
  <circle cx="168" cy="126" r="2" fill="#60a5fa" opacity="0.4" />
  <circle cx="163" cy="140" r="2" fill="#60a5fa" opacity="0.35" />

  <!-- Circuit traces extending LEFT into brain area -->
  <line x1="88" y1="72" x2="68" y2="68" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="88" y1="88" x2="62" y2="90" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="88" y1="100" x2="58" y2="102" stroke="#60a5fa" stroke-width="1.2" opacity="0.35" stroke-linecap="round" />
  <line x1="88" y1="112" x2="65" y2="115" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="88" y1="128" x2="72" y2="132" stroke="#60a5fa" stroke-width="1" opacity="0.25" stroke-linecap="round" />

  <!-- Circuit nodes in brain area (chip leaking into brain) -->
  <circle cx="68" cy="68" r="2" fill="#60a5fa" opacity="0.3" />
  <circle cx="62" cy="90" r="2" fill="#60a5fa" opacity="0.3" />
  <circle cx="58" cy="102" r="2.5" fill="#60a5fa" opacity="0.35" />
  <circle cx="65" cy="115" r="2" fill="#60a5fa" opacity="0.3" />
  <circle cx="72" cy="132" r="2" fill="#60a5fa" opacity="0.25" />
</svg>
