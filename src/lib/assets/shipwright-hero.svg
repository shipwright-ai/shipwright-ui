<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Compass circle -->
  <circle cx="100" cy="100" r="85" stroke="#60a5fa" stroke-width="1.5" opacity="0.2" />
  <circle cx="100" cy="100" r="75" stroke="#60a5fa" stroke-width="0.5" opacity="0.1" />

  <!-- Compass cardinal marks -->
  <line x1="100" y1="18" x2="100" y2="28" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" />
  <line x1="100" y1="172" x2="100" y2="182" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" />
  <line x1="18" y1="100" x2="28" y2="100" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" />
  <line x1="172" y1="100" x2="182" y2="100" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" />

  <!-- Diagonal marks -->
  <line x1="42" y1="42" x2="49" y2="49" stroke="#60a5fa" stroke-width="1" opacity="0.2" />
  <line x1="151" y1="42" x2="158" y2="49" stroke="#60a5fa" stroke-width="1" opacity="0.2" />
  <line x1="42" y1="158" x2="49" y2="151" stroke="#60a5fa" stroke-width="1" opacity="0.2" />
  <line x1="151" y1="158" x2="158" y2="151" stroke="#60a5fa" stroke-width="1" opacity="0.2" />

  <!-- Brain left hemisphere -->
  <path d="M100 55 C90 45, 72 42, 65 50 C58 58, 56 70, 60 80 C52 85, 48 95, 52 105 C56 115, 65 120, 75 118 C75 130, 82 140, 95 143"
    stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />

  <!-- Brain right hemisphere -->
  <path d="M100 55 C110 45, 128 42, 135 50 C142 58, 144 70, 140 80 C148 85, 152 95, 148 105 C144 115, 135 120, 125 118 C125 130, 118 140, 105 143"
    stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />

  <!-- Brain center folds -->
  <path d="M100 58 L100 140" stroke="#60a5fa" stroke-width="0.5" opacity="0.2" />
  <path d="M80 70 Q90 80, 100 75" stroke="#60a5fa" stroke-width="1" opacity="0.3" />
  <path d="M120 70 Q110 80, 100 75" stroke="#60a5fa" stroke-width="1" opacity="0.3" />
  <path d="M75 95 Q88 90, 100 95" stroke="#60a5fa" stroke-width="1" opacity="0.3" />
  <path d="M125 95 Q112 90, 100 95" stroke="#60a5fa" stroke-width="1" opacity="0.3" />

  <!-- Circuit nodes -->
  <circle cx="72" cy="72" r="3" fill="#60a5fa" opacity="0.8" />
  <circle cx="128" cy="72" r="3" fill="#60a5fa" opacity="0.8" />
  <circle cx="60" cy="100" r="3" fill="#60a5fa" opacity="0.8" />
  <circle cx="140" cy="100" r="3" fill="#60a5fa" opacity="0.8" />
  <circle cx="100" cy="85" r="4" fill="#60a5fa" opacity="0.9" />
  <circle cx="85" cy="115" r="2.5" fill="#60a5fa" opacity="0.6" />
  <circle cx="115" cy="115" r="2.5" fill="#60a5fa" opacity="0.6" />

  <!-- Circuit connections -->
  <line x1="72" y1="72" x2="100" y2="85" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="128" y1="72" x2="100" y2="85" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="60" y1="100" x2="85" y2="115" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="140" y1="100" x2="115" y2="115" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="100" y1="85" x2="85" y2="115" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />
  <line x1="100" y1="85" x2="115" y2="115" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" />

  <!-- Ship keel line (subtle, under the brain) -->
  <path d="M70 145 Q100 160, 130 145" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />
  <line x1="100" y1="143" x2="100" y2="155" stroke="#60a5fa" stroke-width="1" opacity="0.3" />
</svg>
