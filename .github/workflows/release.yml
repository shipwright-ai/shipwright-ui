name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Package build
        run: tar -czf brain-ui.tar.gz -C build .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: brain-ui.tar.gz
          generate_release_notes: true
